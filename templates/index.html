<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fff;
            color: #111;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: #f7f7f5;
            border-right: 1px solid #e8e8e6;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 8px;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
        }

        .logo-mark {
            width: 26px;
            height: 26px;
            background: #185FA5;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
        }

        .logo-name { font-size: 15px; font-weight: 600; color: #111; }

        .upload-area {
            border: 1.5px dashed #d0d0d0;
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            background: #fff;
            margin-top: 4px;
        }

        .upload-area:hover { border-color: #185FA5; background: #f0f6ff; }
        .upload-area.dragover { border-color: #185FA5; background: #f0f6ff; }

        .upload-area i { font-size: 22px; color: #bbb; margin-bottom: 6px; display: block; }
        .upload-area p { font-size: 12px; color: #888; line-height: 1.5; }
        .upload-area span { font-size: 11px; color: #bbb; }

        #file-input { display: none; }

        .pdf-info {
            background: #fff;
            border: 1px solid #e8e8e6;
            border-radius: 8px;
            padding: 10px 12px;
            display: none;
        }

        .pdf-info.show { display: block; }

        .pdf-info-name {
            font-size: 12px;
            font-weight: 500;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pdf-info-meta { font-size: 11px; color: #aaa; margin-top: 2px; }

        .progress-bar {
            height: 3px;
            background: #e8e8e6;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.show { display: block; }

        .progress-fill {
            height: 100%;
            background: #185FA5;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        .sidebar-section {
            font-size: 11px;
            color: #aaa;
            padding: 8px 10px 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chat-item {
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover { background: #ebebeb; color: #111; }
        .chat-item.active { background: #e8e8e6; color: #111; font-weight: 500; }

        .sidebar-bottom { margin-top: auto; padding: 8px; }
        .sidebar-bottom p { font-size: 11px; color: #bbb; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .topbar {
            padding: 14px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-title { font-size: 14px; font-weight: 500; color: #111; }
        .topbar-right { display: flex; gap: 8px; }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 1px solid #e8e8e8;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: all 0.15s;
        }

        .icon-btn:hover { background: #f5f5f5; color: #111; }
        .icon-btn i { font-size: 15px; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 28px 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding-bottom: 80px;
        }

        .empty-icon {
            width: 52px;
            height: 52px;
            background: #f0f6ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon i { font-size: 24px; color: #185FA5; }
        .empty h2 { font-size: 20px; font-weight: 600; color: #111; }

        .empty p {
            font-size: 14px;
            color: #999;
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }

        .suggestion {
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            color: #555;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
        }

        .suggestion:hover { border-color: #185FA5; color: #185FA5; background: #f0f6ff; }

        .msg { display: flex; flex-direction: column; gap: 4px; }
        .msg.user { align-items: flex-end; }
        .msg.assistant { align-items: flex-start; }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.75;
            max-width: 75%;
            white-space: pre-wrap;
        }

        .user .bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: #f7f7f5; color: #111; border-bottom-left-radius: 4px; }

        .source-label {
            font-size: 11px;
            color: #bbb;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-label i { font-size: 12px; }

        .typing-wrap { display: flex; }

        .typing {
            padding: 12px 18px;
            background: #f7f7f5;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        .input-area {
            padding: 16px 48px 24px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .input-wrap {
            background: #f7f7f5;
            border: 1px solid #e8e8e6;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: border-color 0.15s;
        }

        .input-wrap:focus-within { border-color: #185FA5; background: #fff; }

        #q {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            color: #111;
            background: transparent;
            resize: none;
            height: 24px;
            max-height: 120px;
            line-height: 1.6;
        }

        #q::placeholder { color: #bbb; }
        #q:disabled { opacity: 0.5; }

        #send {
            width: 30px;
            height: 30px;
            background: #185FA5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        #send:hover { background: #0C447C; }
        #send:disabled { background: #c5d8ee; cursor: not-allowed; }
        #send i { font-size: 14px; color: #fff; }

        .status-msg {
            font-size: 12px;
            color: #185FA5;
            text-align: center;
            margin-top: 8px;
            min-height: 16px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <div class="logo-mark">K</div>
        <span class="logo-name">Kiro</span>
    </div>

    <!-- upload area -->
    <div class="upload-area" onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
        <i class="ti ti-file-upload"></i>
        <p>Upload your PDF</p>
        <span>Click or drag and drop</span>
    </div>
    <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(event)">

    <!-- pdf info after upload -->
    <div class="pdf-info" id="pdf-info">
        <div class="pdf-info-name" id="pdf-name">—</div>
        <div class="pdf-info-meta" id="pdf-meta">Processing...</div>
        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="sidebar-section">Recent</div>
    <div class="chat-item active" id="current-chat">New conversation</div>

    <div class="sidebar-bottom">
        <p>Kiro — notes + web</p>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <span class="topbar-title" id="chat-title">New conversation</span>
        <div class="topbar-right">
            <button class="icon-btn" onclick="clearChat()" title="Clear chat">
                <i class="ti ti-trash"></i>
            </button>
        </div>
    </div>

    <div id="chat-box">
        <div class="empty" id="empty">
            <div class="empty-icon"><i class="ti ti-file-text"></i></div>
            <h2>Upload a PDF to start</h2>
            <p>Upload any PDF on the left — handwritten notes, textbooks, or documents — then ask anything about it</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <textarea id="q" placeholder="Upload a PDF first..." disabled
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button id="send" onclick="sendMsg()" disabled>
                <i class="ti ti-arrow-up"></i>
            </button>
        </div>
        <div class="status-msg" id="status-msg"></div>
    </div>
</div>

<script>
    const box         = document.getElementById('chat-box');
    const inp         = document.getElementById('q');
    const btn         = document.getElementById('send');
    const title       = document.getElementById('chat-title');
    const currentChat = document.getElementById('current-chat');
    const statusMsg   = document.getElementById('status-msg');
    const pdfInfo     = document.getElementById('pdf-info');
    const pdfName     = document.getElementById('pdf-name');
    const pdfMeta     = document.getElementById('pdf-meta');
    const progressBar = document.getElementById('progress-bar');
    const progressFill= document.getElementById('progress-fill');
    let firstMsg      = true;
    let pdfReady      = false;

    function autoResize(el) {
        el.style.height = '24px';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('dragover');
    }

    function handleDragLeave(e) {
        e.currentTarget.classList.remove('dragover');
    }

    function handleDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') uploadFile(file);
    }

    function handleFileSelect(e) {
        const file = e.target.files[0];
        if (file) uploadFile(file);
    }

    async function uploadFile(file) {
        pdfInfo.classList.add('show');
        pdfName.textContent = file.name;
        pdfMeta.textContent = 'Uploading...';
        progressBar.classList.add('show');
        progressFill.style.width = '10%';
        statusMsg.textContent = 'Processing your PDF...';
        inp.placeholder = 'Processing PDF...';

        // animate progress
        let progress = 10;
        const interval = setInterval(() => {
            progress = Math.min(progress + 2, 85);
            progressFill.style.width = progress + '%';
        }, 1000);

        try {
            const formData = new FormData();
            formData.append('file', file);

            const r = await fetch('/upload', { method: 'POST', body: formData });
            const d = await r.json();

            clearInterval(interval);

            if (d.status === 'ready') {
                progressFill.style.width = '100%';
                pdfMeta.textContent = `${d.chunks} chunks ready`;
                statusMsg.textContent = '';
                inp.placeholder = 'Ask anything about your PDF...';
                inp.disabled = false;
                btn.disabled = false;
                pdfReady = true;

                // update empty state
                document.getElementById('empty').innerHTML = `
                    <div class="empty-icon"><i class="ti ti-circle-check"></i></div>
                    <h2>Ready to chat</h2>
                    <p>${file.name} is loaded — ask anything about it or anything on the web</p>
                    <div class="suggestions">
                        <button class="suggestion" onclick="ask('Summarize this document')">Summarize document</button>
                        <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                        <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                    </div>`;

            } else {
                clearInterval(interval);
                pdfMeta.textContent = 'Upload failed';
                statusMsg.textContent = d.message || 'Something went wrong';
            }

        } catch(e) {
            clearInterval(interval);
            pdfMeta.textContent = 'Upload failed';
            statusMsg.textContent = 'Could not process PDF';
        }
    }

    function removeEmpty() {
        const e = document.getElementById('empty');
        if (e) e.remove();
    }

    function addMsg(role, text, tool) {
        removeEmpty();
        const m = document.createElement('div');
        m.className = `msg ${role}`;
        const b = document.createElement('div');
        b.className = 'bubble';
        b.textContent = text;
        m.appendChild(b);
        if (role === 'assistant' && tool) {
            const s = document.createElement('div');
            s.className = 'source-label';
            s.innerHTML = tool === 'search_notes'
                ? '<i class="ti ti-file-text"></i> from your PDF'
                : '<i class="ti ti-world"></i> from the web';
            m.appendChild(s);
        }
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;
        if (firstMsg && role === 'user') {
            const t = text.length > 30 ? text.substring(0, 30) + '...' : text;
            title.textContent = t;
            currentChat.textContent = t;
            firstMsg = false;
        }
    }

    function addTyping() {
        removeEmpty();
        const w = document.createElement('div');
        w.className = 'typing-wrap';
        w.id = 'typing';
        w.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        box.appendChild(w);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const q = inp.value.trim();
        if (!q || !pdfReady) return;
        inp.value = '';
        inp.style.height = '24px';
        btn.disabled = true;
        addMsg('user', q);
        addTyping();
        try {
            const r = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q })
            });
            const d = await r.json();
            document.getElementById('typing')?.remove();
            addMsg('assistant', d.answer, d.tool_used);
        } catch(e) {
            document.getElementById('typing')?.remove();
            addMsg('assistant', 'Something went wrong. Please try again.');
        }
        btn.disabled = false;
        inp.focus();
    }

    async function clearChat() {
        await fetch('/clear', { method: 'POST' });
        firstMsg = true;
        title.textContent = 'New conversation';
        currentChat.textContent = 'New conversation';
        box.innerHTML = pdfReady
            ? `<div class="empty" id="empty">
                <div class="empty-icon"><i class="ti ti-circle-check"></i></div>
                <h2>Ready to chat</h2>
                <p>Ask anything about your PDF or anything on the web</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="ask('Summarize this document')">Summarize document</button>
                    <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                    <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                </div></div>`
            : `<div class="empty" id="empty">
                <div class="empty-icon"><i class="ti ti-file-text"></i></div>
                <h2>Upload a PDF to start</h2>
                <p>Upload any PDF on the left — handwritten notes, textbooks, or documents — then ask anything about it</p>
               </div>`;
    }

    function ask(q) { inp.value = q; sendMsg(); }
</script>

</body>
</html>
