<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fff;
            color: #111;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 99;
        }
        .overlay.show { display: block; }

        /* ── Sidebar ── */
        .sidebar {
            width: 256px;
            background: #f9f9f7;
            border-right: 0.5px solid #e8e8e6;
            display: flex;
            flex-direction: column;
            padding: 12px 8px;
            gap: 4px;
            flex-shrink: 0;
            z-index: 100;
            transition: transform 0.25s ease;
        }

        .sidebar-top {
            padding: 8px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand { font-size: 16px; font-weight: 500; color: #111; letter-spacing: -0.3px; }

        .new-btn {
            width: 28px; height: 28px;
            border: 0.5px solid #e0e0e0;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #666;
            transition: all 0.15s;
        }
        .new-btn:hover { background: #f0f0f0; color: #111; }
        .new-btn i { font-size: 14px; }

        .section-label {
            font-size: 11px; color: #bbb;
            padding: 8px 8px 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chat-item {
            padding: 7px 10px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px; color: #555;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: all 0.15s;
        }
        .chat-item:hover { background: #ebebeb; color: #111; }
        .chat-item.active { background: #e8e8e6; color: #111; font-weight: 500; }

        .sidebar-footer { margin-top: auto; padding: 8px; font-size: 11px; color: #ccc; }

        /* ── Main ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        .mob-header {
            display: none;
            padding: 12px 16px;
            border-bottom: 0.5px solid #f0f0f0;
            align-items: center; justify-content: space-between;
            background: #fff; flex-shrink: 0;
        }
        .mob-brand { font-size: 15px; font-weight: 500; color: #111; letter-spacing: -0.3px; }

        .hamburger {
            width: 30px; height: 30px;
            border: 0.5px solid #e8e8e8; border-radius: 7px;
            background: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #666;
        }
        .hamburger i { font-size: 15px; }

        .topbar {
            padding: 12px 20px;
            border-bottom: 0.5px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .topbar-title { font-size: 13px; color: #888; }

        .icon-btn {
            width: 28px; height: 28px;
            border: 0.5px solid #e8e8e8; border-radius: 6px;
            background: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #888; transition: all 0.15s;
        }
        .icon-btn:hover { background: #f5f5f5; color: #111; }
        .icon-btn i { font-size: 14px; }

        /* ── Chat ── */
        #chat-box {
            flex: 1; overflow-y: auto;
            padding: 32px 20%;
            display: flex; flex-direction: column;
            gap: 20px;
        }

        .empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; padding-bottom: 60px;
        }
        .empty h2 { font-size: 24px; font-weight: 500; color: #111; letter-spacing: -0.5px; }
        .empty p { font-size: 14px; color: #999; text-align: center; max-width: 340px; line-height: 1.6; }

        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
        .suggestion {
            font-size: 13px; padding: 8px 14px;
            border-radius: 20px; border: 0.5px solid #e0e0e0;
            color: #555; background: #fff; cursor: pointer; transition: all 0.15s;
        }
        .suggestion:hover { border-color: #185FA5; color: #185FA5; background: #f0f6ff; }

        .msg { display: flex; flex-direction: column; gap: 4px; }
        .msg.user { align-items: flex-end; }
        .msg.assistant { align-items: flex-start; }

        .bubble {
            padding: 12px 16px; border-radius: 16px;
            font-size: 14px; line-height: 1.75;
            max-width: 80%; white-space: pre-wrap; word-break: break-word;
        }
        .user .bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: #f5f5f3; color: #111; border-bottom-left-radius: 4px; }

        .source-label {
            font-size: 11px; color: #bbb; padding: 0 4px;
            display: flex; align-items: center; gap: 4px;
        }
        .source-label i { font-size: 12px; }

        .typing-wrap { display: flex; }
        .typing {
            padding: 12px 16px; background: #f5f5f3;
            border-radius: 16px; border-bottom-left-radius: 4px;
            display: flex; gap: 5px; align-items: center;
        }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: #ccc; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce {
            0%,80%,100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        /* ── Input area ── */
        .input-area {
            padding: 12px 20% 24px;
            background: #fff;
            border-top: 0.5px solid #f0f0f0;
            flex-shrink: 0;
        }

        .pdf-chip {
            display: flex; align-items: center; gap: 8px;
            background: #f0f6ff;
            border: 0.5px solid #c5d8ee;
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 12px; color: #185FA5;
            width: fit-content;
            margin-bottom: 8px;
        }
        .pdf-chip i { font-size: 13px; }
        .pdf-chip span { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pdf-chip button {
            border: none; background: transparent;
            color: #888; cursor: pointer; font-size: 14px;
            line-height: 1; padding: 0 2px;
        }
        .pdf-chip button:hover { color: #111; }

        .upload-progress {
            display: none;
            background: #fff;
            border: 0.5px solid #e8e8e6;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .upload-progress.show { display: block; }
        .upload-progress-row { display: flex; align-items: center; gap: 10px; }
        .upload-progress-row i { font-size: 18px; color: #185FA5; }
        .upload-progress-info { flex: 1; }
        .upload-progress-name { font-size: 12px; font-weight: 500; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .upload-progress-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
        .upload-bar { height: 2px; background: #eee; border-radius: 2px; margin-top: 6px; }
        .upload-bar-fill { height: 100%; background: #185FA5; border-radius: 2px; width: 0%; transition: width 0.3s; }

        .input-wrap {
            background: #f9f9f7;
            border: 0.5px solid #e8e8e6;
            border-radius: 14px;
            padding: 10px 14px;
            display: flex; gap: 8px; align-items: flex-end;
            transition: border-color 0.15s;
        }
        .input-wrap:focus-within { border-color: #185FA5; background: #fff; }

        .attach-btn {
            width: 26px; height: 26px;
            border: none; background: transparent;
            border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #aaa; flex-shrink: 0; transition: all 0.15s;
        }
        .attach-btn:hover { color: #185FA5; background: #f0f6ff; }
        .attach-btn i { font-size: 16px; }

        #q {
            flex: 1; border: none; outline: none;
            font-size: 14px; font-family: inherit; color: #111;
            background: transparent; resize: none;
            height: 24px; max-height: 120px; line-height: 1.6;
        }
        #q::placeholder { color: #bbb; }

        #send {
            width: 28px; height: 28px;
            background: #185FA5; border: none; border-radius: 7px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s; flex-shrink: 0;
        }
        #send:hover { background: #0C447C; }
        #send:disabled { background: #c5d8ee; cursor: not-allowed; }
        #send i { font-size: 13px; color: #fff; }

        .input-hint { font-size: 11px; color: #ccc; text-align: center; margin-top: 6px; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; height: 100vh;
                transform: translateX(-100%);
                box-shadow: 4px 0 20px rgba(0,0,0,0.08);
            }
            .sidebar.open { transform: translateX(0); }
            .mob-header { display: flex; }
            .topbar { display: none; }
            #chat-box { padding: 20px 16px; }
            .input-area { padding: 12px 16px 20px; }
            .bubble { max-width: 90%; }
            .empty h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <span class="brand">kiro</span>
        <button class="new-btn" onclick="newChat()" title="New chat">
            <i class="ti ti-edit"></i>
        </button>
    </div>
    <div class="section-label">Recent</div>
    <div class="chat-item active" id="current-chat">New conversation</div>
    <div class="sidebar-footer">kiro · notes + web</div>
</div>

<div class="main">
    <div class="mob-header">
        <span class="mob-brand">kiro</span>
        <button class="hamburger" onclick="toggleSidebar()">
            <i class="ti ti-menu-2"></i>
        </button>
    </div>

    <div class="topbar">
        <span class="topbar-title" id="chat-title">New conversation</span>
        <div style="display:flex;gap:8px">
            <button class="icon-btn" onclick="clearChat()" title="Clear chat">
                <i class="ti ti-trash"></i>
            </button>
        </div>
    </div>

    <div id="chat-box">
        <div class="empty" id="empty">
            <h2>What can I help with?</h2>
            <p>Upload a PDF using the paperclip or ask anything on the web</p>
            <div class="suggestions">
                <button class="suggestion" onclick="ask('Summarize this document')">Summarize document</button>
                <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                <button class="suggestion" onclick="ask('Who is the current PM of India?')">Current PM of India</button>
                <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <!-- pdf chip shown after upload -->
        <div id="pdf-chip-wrap"></div>

        <!-- upload progress -->
        <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-row">
                <i class="ti ti-file-text"></i>
                <div class="upload-progress-info">
                    <div class="upload-progress-name" id="upload-name">Uploading...</div>
                    <div class="upload-progress-meta" id="upload-meta">Processing PDF</div>
                    <div class="upload-bar">
                        <div class="upload-bar-fill" id="upload-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Upload PDF">
                <i class="ti ti-paperclip"></i>
            </button>
            <textarea id="q" placeholder="Ask anything..."
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button id="send" onclick="sendMsg()">
                <i class="ti ti-arrow-up"></i>
            </button>
        </div>
        <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>

    <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(event)" hidden>
</div>

<script>

    // sessionStorage is unique per tab, unlike cookies
    let tabId = sessionStorage.getItem('tab_id');
    if (!tabId) {
    tabId = Math.random().toString(36).substring(2, 15);
    sessionStorage.setItem('tab_id', tabId);
    }

    const box         = document.getElementById('chat-box');
    const inp         = document.getElementById('q');
    const btn         = document.getElementById('send');
    const title       = document.getElementById('chat-title');
    const currentChat = document.getElementById('current-chat');
    const chipWrap    = document.getElementById('pdf-chip-wrap');
    const uploadProg  = document.getElementById('upload-progress');
    const uploadName  = document.getElementById('upload-name');
    const uploadMeta  = document.getElementById('upload-meta');
    const uploadFill  = document.getElementById('upload-fill');
    let firstMsg      = true;
    let pdfReady      = false;

    function autoResize(el) {
        el.style.height = '24px';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    function handleFileSelect(e) {
        const f = e.target.files[0];
        if (f) uploadFile(f);
    }

    async function uploadFile(file) {
        // show progress
        chipWrap.innerHTML = '';
        uploadProg.classList.add('show');
        uploadName.textContent = file.name;
        uploadMeta.textContent = 'Processing...';
        uploadFill.style.width = '10%';
        inp.placeholder = 'Processing PDF...';
        btn.disabled = true;

        let progress = 10;
        const interval = setInterval(() => {
            progress = Math.min(progress + 2, 85);
            uploadFill.style.width = progress + '%';
        }, 1000);

        try {
            const formData = new FormData();
             // include tab_id in the upload request
             formData.append('file', file)
             formData.append('tab_id', tabId)
            const r = await fetch('/upload', { method: 'POST', body: formData });
            const d = await r.json();
            clearInterval(interval);

            if (d.status === 'ready') {
                uploadFill.style.width = '100%';
                uploadMeta.textContent = d.chunks + ' chunks ready';

                setTimeout(() => {
                    uploadProg.classList.remove('show');
                    chipWrap.innerHTML = `
                        <div class="pdf-chip">
                            <i class="ti ti-file-text"></i>
                            <span>${file.name}</span>
                            <button onclick="removePDF()" title="Remove">×</button>
                        </div>`;
                }, 800);

                inp.placeholder = 'Ask anything about your PDF...';
                btn.disabled = false;
                pdfReady = true;

                const empty = document.getElementById('empty');
                if (empty) {
                    empty.innerHTML = `
                        <h2>What do you want to know?</h2>
                        <p>${file.name} is ready — ask anything about it or the web</p>
                        <div class="suggestions">
                            <button class="suggestion" onclick="ask('Summarize this document')">Summarize</button>
                            <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                            <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                        </div>`;
                }

            } else {
                uploadProg.classList.remove('show');
                uploadMeta.textContent = 'Upload failed';
                inp.placeholder = 'Ask anything...';
                btn.disabled = false;
            }

        } catch(e) {
            clearInterval(interval);
            uploadProg.classList.remove('show');
            inp.placeholder = 'Ask anything...';
            btn.disabled = false;
        }
    }

    function removePDF() {
        chipWrap.innerHTML = '';
        pdfReady = false;
        document.getElementById('file-input').value = '';
        inp.placeholder = 'Ask anything...';
    }

    function removeEmpty() {
        const e = document.getElementById('empty');
        if (e) e.remove();
    }

    function addMsg(role, text, tool) {
        removeEmpty();
        const m = document.createElement('div');
        m.className = `msg ${role}`;
        const b = document.createElement('div');
        b.className = 'bubble';
        b.textContent = text;
        m.appendChild(b);
        if (role === 'assistant' && tool) {
            const s = document.createElement('div');
            s.className = 'source-label';
            s.innerHTML = tool === 'search_notes'
                ? '<i class="ti ti-file-text"></i> from your PDF'
                : '<i class="ti ti-world"></i> from the web';
            m.appendChild(s);
        }
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;
        if (firstMsg && role === 'user') {
            const t = text.length > 30 ? text.substring(0, 30) + '...' : text;
            title.textContent = t;
            currentChat.textContent = t;
            firstMsg = false;
        }
    }

    function addTyping() {
        removeEmpty();
        const w = document.createElement('div');
        w.className = 'typing-wrap';
        w.id = 'typing';
        w.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        box.appendChild(w);
        box.scrollTop = box.scrollHeight;
    }

    // Type out text with a small delay per character for a natural typing effect.
    // Adjust `CHAR_DELAY_MS` to make it faster or slower.
    const CHAR_DELAY_MS = 20;
    async function typeOut(text, el, charDelay = CHAR_DELAY_MS) {
        for (let i = 0; i < text.length; i++) {
            el.textContent += text[i];
            box.scrollTop = box.scrollHeight;
            // small await to create typing effect
            await new Promise(r => setTimeout(r, charDelay));
        }
    }

    async function sendMsg() {
        const q = inp.value.trim();
        if (!q) return;
        inp.value = '';
        inp.style.height = '24px';
        btn.disabled = true;
        addMsg('user', q);
        addTyping();
        try {
            // use streaming endpoint (SSE) to receive partial chunks
            const r = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Stream': 'true' },
                body: JSON.stringify({ question: q, tab_id: tabId })
            });

            if (!r.ok) throw new Error('Network response was not ok');

            // create assistant bubble and update progressively
            document.getElementById('typing')?.remove();
            const assistantMsg = document.createElement('div');
            assistantMsg.className = 'msg assistant';
            const assistantBubble = document.createElement('div');
            assistantBubble.className = 'bubble';
            assistantBubble.textContent = '';
            assistantMsg.appendChild(assistantBubble);
            box.appendChild(assistantMsg);
            box.scrollTop = box.scrollHeight;

            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let tool_used = null;

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                // process SSE events separated by double newline
                let parts = buffer.split('\n\n');
                buffer = parts.pop(); // remainder
                for (const part of parts) {
                    if (!part.startsWith('data:')) continue;
                    const payload = part.replace(/^data:\s*/,'');
                    try {
                        const ev = JSON.parse(payload);
                        if (ev.type === 'meta' && ev.tool) {
                            tool_used = ev.tool;
                        } else if (ev.type === 'chunk' && ev.text) {
                            // type out the incoming chunk slowly for a natural feel
                            await typeOut(ev.text, assistantBubble);
                        } else if (ev.type === 'done') {
                            // finished
                        }
                    } catch(e) {
                        // ignore parse errors
                    }
                }
            }

            // remove typing if still present and add source label
            document.getElementById('typing')?.remove();
            if (tool_used) {
                const s = document.createElement('div');
                s.className = 'source-label';
                s.innerHTML = tool_used === 'search_notes'
                    ? '<i class="ti ti-file-text"></i> from your PDF'
                    : '<i class="ti ti-world"></i> from the web';
                assistantMsg.appendChild(s);
            }
        } catch(e) {
            document.getElementById('typing')?.remove();
            addMsg('assistant', 'Something went wrong. Please try again.');
        }
        btn.disabled = false;
        inp.focus();
    }

    async function clearChat() {
        await fetch('/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tab_id: tabId })  // add tab_id
    });
        firstMsg = true;
        title.textContent = 'New conversation';
        currentChat.textContent = 'New conversation';
        box.innerHTML = pdfReady
            ? `<div class="empty" id="empty">
                <h2>What do you want to know?</h2>
                <p>Ask anything about your PDF or the web</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="ask('Summarize this document')">Summarize</button>
                    <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                    <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                </div></div>`
            : `<div class="empty" id="empty">
                <h2>What can I help with?</h2>
                <p>Upload a PDF using the paperclip or ask anything on the web</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="ask('Summarize this document')">Summarize document</button>
                    <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                    <button class="suggestion" onclick="ask('Who is the current PM of India?')">Current PM of India</button>
                    <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                </div></div>`;
    }

    function newChat() { clearChat(); }
    function ask(q) { inp.value = q; sendMsg(); }
</script>

</body>
</html>
