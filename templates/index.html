<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fff;
            color: #111;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 99;
        }
        .overlay.show { display: block; }

        .sidebar {
            width: 256px;
            background: #f9f9f7;
            border-right: 0.5px solid #e8e8e6;
            display: flex;
            flex-direction: column;
            padding: 12px 8px;
            gap: 4px;
            flex-shrink: 0;
            z-index: 100;
            transition: transform 0.25s ease;
        }

        .sidebar-top {
            padding: 8px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 16px;
            font-weight: 500;
            color: #111;
            letter-spacing: -0.3px;
        }

        .new-btn {
            width: 28px;
            height: 28px;
            border: 0.5px solid #e0e0e0;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.15s;
        }
        .new-btn:hover { background: #f0f0f0; color: #111; }
        .new-btn i { font-size: 14px; }

        .upload-zone {
            margin: 4px 0;
            border: 1.5px dashed #ddd;
            border-radius: 10px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            background: #fff;
        }
        .upload-zone:hover { border-color: #185FA5; background: #f0f6ff; }
        .upload-zone.dragover { border-color: #185FA5; background: #f0f6ff; }
        .upload-zone i { font-size: 20px; color: #bbb; display: block; margin-bottom: 6px; }
        .upload-zone p { font-size: 12px; color: #888; font-weight: 500; }
        .upload-zone span { font-size: 11px; color: #bbb; }

        .pdf-card {
            background: #fff;
            border: 0.5px solid #e8e8e6;
            border-radius: 8px;
            padding: 10px 12px;
            display: none;
            margin: 4px 0;
        }
        .pdf-card.show { display: block; }

        .pdf-card-name {
            font-size: 12px;
            font-weight: 500;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pdf-card-name i { font-size: 14px; color: #185FA5; flex-shrink: 0; }

        .pdf-card-meta { font-size: 11px; color: #aaa; margin-top: 3px; }

        .prog {
            height: 2px;
            background: #eee;
            border-radius: 2px;
            margin-top: 8px;
            display: none;
        }
        .prog.show { display: block; }
        .prog-fill {
            height: 100%;
            background: #185FA5;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        .section-label {
            font-size: 11px;
            color: #bbb;
            padding: 8px 8px 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chat-item {
            padding: 7px 10px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.15s;
        }
        .chat-item:hover { background: #ebebeb; color: #111; }
        .chat-item.active { background: #e8e8e6; color: #111; font-weight: 500; }

        .sidebar-footer { margin-top: auto; padding: 8px; font-size: 11px; color: #ccc; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        .mob-header {
            display: none;
            padding: 12px 16px;
            border-bottom: 0.5px solid #f0f0f0;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            flex-shrink: 0;
        }

        .mob-brand { font-size: 15px; font-weight: 500; color: #111; letter-spacing: -0.3px; }

        .hamburger {
            width: 30px;
            height: 30px;
            border: 0.5px solid #e8e8e8;
            border-radius: 7px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        .hamburger i { font-size: 15px; }

        .topbar {
            padding: 12px 20px;
            border-bottom: 0.5px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar-title { font-size: 13px; color: #888; }

        .icon-btn {
            width: 28px;
            height: 28px;
            border: 0.5px solid #e8e8e8;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: all 0.15s;
        }
        .icon-btn:hover { background: #f5f5f5; color: #111; }
        .icon-btn i { font-size: 14px; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 32px 20%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding-bottom: 60px;
        }

        .empty h2 { font-size: 24px; font-weight: 500; color: #111; letter-spacing: -0.5px; }

        .empty p {
            font-size: 14px;
            color: #999;
            text-align: center;
            max-width: 340px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }

        .suggestion {
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 20px;
            border: 0.5px solid #e0e0e0;
            color: #555;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
        }
        .suggestion:hover { border-color: #185FA5; color: #185FA5; background: #f0f6ff; }

        .msg { display: flex; flex-direction: column; gap: 4px; }
        .msg.user { align-items: flex-end; }
        .msg.assistant { align-items: flex-start; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.75;
            max-width: 80%;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: #f5f5f3; color: #111; border-bottom-left-radius: 4px; }

        .source-label {
            font-size: 11px;
            color: #bbb;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .source-label i { font-size: 12px; }

        .typing-wrap { display: flex; }
        .typing {
            padding: 12px 16px;
            background: #f5f5f3;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot { width: 4px; height: 4px; border-radius: 50%; background: #ccc; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        .input-area {
            padding: 12px 20% 24px;
            background: #fff;
            border-top: 0.5px solid #f0f0f0;
            flex-shrink: 0;
        }

        .input-wrap {
            background: #f9f9f7;
            border: 0.5px solid #e8e8e6;
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: border-color 0.15s;
        }
        .input-wrap:focus-within { border-color: #185FA5; background: #fff; }

        #q {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            color: #111;
            background: transparent;
            resize: none;
            height: 24px;
            max-height: 120px;
            line-height: 1.6;
        }
        #q::placeholder { color: #bbb; }
        #q:disabled { opacity: 0.4; }

        #send {
            width: 28px;
            height: 28px;
            background: #185FA5;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        #send:hover { background: #0C447C; }
        #send:disabled { background: #c5d8ee; cursor: not-allowed; }
        #send i { font-size: 13px; color: #fff; }

        .status-msg {
            font-size: 11px;
            color: #185FA5;
            text-align: center;
            margin-top: 6px;
            min-height: 14px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                transform: translateX(-100%);
                box-shadow: 4px 0 20px rgba(0,0,0,0.08);
            }
            .sidebar.open { transform: translateX(0); }
            .mob-header { display: flex; }
            .topbar { display: none; }
            #chat-box { padding: 20px 16px; }
            .input-area { padding: 12px 16px 20px; }
            .bubble { max-width: 90%; }
            .empty h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <span class="brand">kiro</span>
        <button class="new-btn" onclick="newChat()" title="New chat">
            <i class="ti ti-edit"></i>
        </button>
    </div>

    <div class="upload-zone"
         onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)"
         ondrop="handleDrop(event)"
         ondragleave="handleDragLeave(event)">
        <i class="ti ti-file-upload"></i>
        <p>Upload PDF</p>
        <span>Click or drag and drop</span>
    </div>
    <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(event)">

    <div class="pdf-card" id="pdf-info">
        <div class="pdf-card-name">
            <i class="ti ti-file-text"></i>
            <span id="pdf-name">—</span>
        </div>
        <div class="pdf-card-meta" id="pdf-meta">Processing...</div>
        <div class="prog" id="progress-bar">
            <div class="prog-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="section-label">Recent</div>
    <div class="chat-item active" id="current-chat">New conversation</div>

    <div class="sidebar-footer">kiro · notes + web</div>
</div>

<div class="main">
    <div class="mob-header">
        <span class="mob-brand">kiro</span>
        <button class="hamburger" onclick="toggleSidebar()">
            <i class="ti ti-menu-2"></i>
        </button>
    </div>

    <div class="topbar">
        <span class="topbar-title" id="chat-title">New conversation</span>
        <div style="display:flex;gap:8px">
            <button class="icon-btn" onclick="clearChat()" title="Clear chat">
                <i class="ti ti-trash"></i>
            </button>
        </div>
    </div>

    <div id="chat-box">
        <div class="empty" id="empty">
            <h2>What can I help with?</h2>
            <p>Upload a PDF from the sidebar or ask anything on the web</p>
            <div class="suggestions">
                <button class="suggestion" onclick="ask('Summarize this document')">Summarize document</button>
                <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                <button class="suggestion" onclick="ask('Who is the current PM of India?')">Current PM of India</button>
                <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <textarea id="q" placeholder="Ask anything..."
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button id="send" onclick="sendMsg()">
                <i class="ti ti-arrow-up"></i>
            </button>
        </div>
        <div class="status-msg" id="status-msg"></div>
    </div>
</div>

<script>
    const box          = document.getElementById('chat-box');
    const inp          = document.getElementById('q');
    const btn          = document.getElementById('send');
    const title        = document.getElementById('chat-title');
    const currentChat  = document.getElementById('current-chat');
    const statusMsg    = document.getElementById('status-msg');
    const pdfInfo      = document.getElementById('pdf-info');
    const pdfNameEl    = document.getElementById('pdf-name');
    const pdfMeta      = document.getElementById('pdf-meta');
    const progressBar  = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    let firstMsg       = true;
    let pdfReady       = false;

    function autoResize(el) {
        el.style.height = '24px';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('dragover');
    }

    function handleDragLeave(e) {
        e.currentTarget.classList.remove('dragover');
    }

    function handleDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('dragover');
        const f = e.dataTransfer.files[0];
        if (f && f.type === 'application/pdf') uploadFile(f);
    }

    function handleFileSelect(e) {
        const f = e.target.files[0];
        if (f) uploadFile(f);
        closeSidebar();
    }

    async function uploadFile(file) {
        pdfInfo.classList.add('show');
        pdfNameEl.textContent = file.name;
        pdfMeta.textContent = 'Uploading...';
        progressBar.classList.add('show');
        progressFill.style.width = '10%';
        statusMsg.textContent = 'Processing your PDF...';
        inp.placeholder = 'Processing PDF...';
        inp.disabled = true;
        btn.disabled = true;

        let progress = 10;
        const interval = setInterval(() => {
            progress = Math.min(progress + 2, 85);
            progressFill.style.width = progress + '%';
        }, 1000);

        try {
            const formData = new FormData();
            formData.append('file', file);
            const r = await fetch('/upload', { method: 'POST', body: formData });
            const d = await r.json();
            clearInterval(interval);

            if (d.status === 'ready') {
                progressFill.style.width = '100%';
                pdfMeta.textContent = d.chunks + ' chunks ready';
                statusMsg.textContent = '';
                inp.placeholder = 'Ask anything about your PDF...';
                inp.disabled = false;
                btn.disabled = false;
                pdfReady = true;

                document.getElementById('empty').innerHTML = `
                    <h2>What do you want to know?</h2>
                    <p>${file.name} is ready — ask anything about it or the web</p>
                    <div class="suggestions">
                        <button class="suggestion" onclick="ask('Summarize this document')">Summarize</button>
                        <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                        <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                    </div>`;
            } else {
                pdfMeta.textContent = 'Upload failed';
                statusMsg.textContent = d.message || 'Something went wrong';
                inp.disabled = false;
                btn.disabled = false;
            }
        } catch(e) {
            clearInterval(interval);
            pdfMeta.textContent = 'Upload failed';
            statusMsg.textContent = 'Could not process PDF';
            inp.disabled = false;
            btn.disabled = false;
        }
    }

    function removeEmpty() {
        const e = document.getElementById('empty');
        if (e) e.remove();
    }

    function addMsg(role, text, tool) {
        removeEmpty();
        const m = document.createElement('div');
        m.className = `msg ${role}`;
        const b = document.createElement('div');
        b.className = 'bubble';
        b.textContent = text;
        m.appendChild(b);
        if (role === 'assistant' && tool) {
            const s = document.createElement('div');
            s.className = 'source-label';
            s.innerHTML = tool === 'search_notes'
                ? '<i class="ti ti-file-text"></i> from your PDF'
                : '<i class="ti ti-world"></i> from the web';
            m.appendChild(s);
        }
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;
        if (firstMsg && role === 'user') {
            const t = text.length > 30 ? text.substring(0, 30) + '...' : text;
            title.textContent = t;
            currentChat.textContent = t;
            firstMsg = false;
        }
    }

    function addTyping() {
        removeEmpty();
        const w = document.createElement('div');
        w.className = 'typing-wrap';
        w.id = 'typing';
        w.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        box.appendChild(w);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const q = inp.value.trim();
        if (!q) return;
        inp.value = '';
        inp.style.height = '24px';
        btn.disabled = true;
        addMsg('user', q);
        addTyping();
        try {
            const r = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q })
            });
            const d = await r.json();
            document.getElementById('typing')?.remove();
            addMsg('assistant', d.answer, d.tool_used);
        } catch(e) {
            document.getElementById('typing')?.remove();
            addMsg('assistant', 'Something went wrong. Please try again.');
        }
        btn.disabled = false;
        inp.focus();
    }

    async function clearChat() {
        await fetch('/clear', { method: 'POST' });
        firstMsg = true;
        title.textContent = 'New conversation';
        currentChat.textContent = 'New conversation';
        box.innerHTML = pdfReady
            ? `<div class="empty" id="empty">
                <h2>What do you want to know?</h2>
                <p>Ask anything about your PDF or the web</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="ask('Summarize this document')">Summarize</button>
                    <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                    <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                </div></div>`
            : `<div class="empty" id="empty">
                <h2>What can I help with?</h2>
                <p>Upload a PDF from the sidebar or ask anything on the web</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="ask('Summarize this document')">Summarize document</button>
                    <button class="suggestion" onclick="ask('What are the main topics?')">Main topics</button>
                    <button class="suggestion" onclick="ask('Who is the current PM of India?')">Current PM of India</button>
                    <button class="suggestion" onclick="ask('What are the key points?')">Key points</button>
                </div></div>`;
    }

    function newChat() { clearChat(); }
    function ask(q) { inp.value = q; sendMsg(); }
</script>

</body>
</html>
